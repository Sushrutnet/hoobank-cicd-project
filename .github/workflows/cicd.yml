name: CI/CD Pipeline


on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |

        docker build \
        -t 565393042572.dkr.ecr.ap-south-1.amazonaws.com/hoobank-app:latest .

    - name: Push Docker Image
      run: |

        docker push \
        565393042572.dkr.ecr.ap-south-1.amazonaws.com/hoobank-app:latest

    - name: Pull Latest Image
      run: |

        docker pull \
        565393042572.dkr.ecr.ap-south-1.amazonaws.com/hoobank-app:latest

    - name: Load Image Into Kind
      run: |

        kind load docker-image \
        565393042572.dkr.ecr.ap-south-1.amazonaws.com/hoobank-app:latest \
        --name hoobank-cluster

    - name: Restart Kubernetes Deployment
      run: |

        kubectl rollout restart deployment hoobank-deployment
